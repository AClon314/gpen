syntax = "proto3";

package gpen.v1;

// Canonical protobuf schema for persisted and cross-runtime gpen documents.
//
// This schema is intentionally a serialization contract, not a byte-for-byte
// mirror of Zig's in-memory layout. ABI-specific details such as packed flags,
// tagged unions, slices, and sentinel defaults are normalized here so storage,
// transport, and future host integrations can share one stable definition.

message Vec3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message Color4 {
  float r = 1;
  float g = 2;
  float b = 3;
  float a = 4;
}

message IndexRange {
  uint32 start = 1;
  uint32 len = 2;
}

message PointFlags {
  bool selected = 1;
  bool locked = 2;
  bool filled = 3;
}

message Point {
  float x = 1;
  float y = 2;
  float z = 3;
  float radius = 4;
  float opacity = 5;
  float pressure = 6;
  float time = 7;
  float uv_rotation = 8;
  Color4 color = 9;
  PointFlags flags = 10;
}

enum StrokeCapType {
  STROKE_CAP_TYPE_ROUND = 0;
  STROKE_CAP_TYPE_FLAT = 1;
}

enum CurveType {
  CURVE_TYPE_CATMULL_ROM = 0;
  CURVE_TYPE_POLY = 1;
  CURVE_TYPE_BEZIER = 2;
  CURVE_TYPE_NURBS = 3;
}

message StrokeFlags {
  bool cyclic = 1;
  bool selected = 2;
  bool hidden = 3;
  bool fill_visible = 4;
}

message Stroke {
  repeated Point points = 1;
  CurveType curve_type = 2;
  uint32 material_index = 3;
  StrokeCapType start_cap = 4;
  StrokeCapType end_cap = 5;
  float softness = 6;
  Color4 fill_color = 7;
  uint32 fill_id = 8;
  StrokeFlags flags = 9;
}

message Drawing {
  repeated Stroke strokes = 1;
  string name = 2;
}

message DrawingReference {
  uint64 source_document_id = 1;
  IndexRange drawing_range = 2;
}

message DrawingSlot {
  oneof payload {
    Drawing drawing = 1;
    DrawingReference reference = 2;
  }
}

message FrameFlags {
  bool selected = 1;
  bool implicit_hold = 2;
}

enum KeyframeType {
  KEYFRAME_TYPE_KEYFRAME = 0;
  KEYFRAME_TYPE_EXTREME = 1;
  KEYFRAME_TYPE_BREAKDOWN = 2;
  KEYFRAME_TYPE_JITTER = 3;
  KEYFRAME_TYPE_MOVE_HOLD = 4;
}

message Frame {
  int32 frame_number = 1;
  uint32 drawing_index = 2;
  uint32 duration = 3;
  KeyframeType key_type = 4;
  FrameFlags flags = 5;
}

message LayerMaskFlags {
  bool hidden = 1;
  bool inverted = 2;
}

message LayerMask {
  uint32 layer_index = 1;
  LayerMaskFlags flags = 2;
}

enum LayerBlendMode {
  LAYER_BLEND_MODE_NONE = 0;
  LAYER_BLEND_MODE_HARDLIGHT = 1;
  LAYER_BLEND_MODE_ADD = 2;
  LAYER_BLEND_MODE_SUBTRACT = 3;
  LAYER_BLEND_MODE_MULTIPLY = 4;
  LAYER_BLEND_MODE_DIVIDE = 5;
}

message LayerFlags {
  bool hidden = 1;
  bool locked = 2;
  bool selected = 3;
  bool muted = 4;
  bool use_lights = 5;
  bool hide_onion_skin = 6;
  bool expanded = 7;
  bool hide_masks = 8;
  bool disable_masks_in_viewlayer = 9;
  bool ignore_locked_materials = 10;
}

message LayerParent {
  string object_name = 1;
  string bone_name = 2;
}

message Transform {
  Vec3 translation = 1;
  Vec3 rotation_euler = 2;
  Vec3 scale = 3;
}

message Matrix4x4F32 {
  // Row-major matrix with exactly 16 elements.
  repeated float elements = 1;
}

message Layer {
  string name = 1;
  repeated Frame frames = 2;
  repeated LayerMask masks = 3;
  LayerBlendMode blend_mode = 4;
  float opacity = 5;
  LayerParent parent = 6;
  Transform transform = 7;
  Matrix4x4F32 parent_inverse = 8;
  string view_layer_name = 9;
  LayerFlags flags = 10;
}

enum GroupColorTag {
  GROUP_COLOR_TAG_NONE = 0;
  GROUP_COLOR_TAG_COLOR_01 = 1;
  GROUP_COLOR_TAG_COLOR_02 = 2;
  GROUP_COLOR_TAG_COLOR_03 = 3;
  GROUP_COLOR_TAG_COLOR_04 = 4;
  GROUP_COLOR_TAG_COLOR_05 = 5;
  GROUP_COLOR_TAG_COLOR_06 = 6;
  GROUP_COLOR_TAG_COLOR_07 = 7;
  GROUP_COLOR_TAG_COLOR_08 = 8;
}

enum LayerTreeNodeKind {
  LAYER_TREE_NODE_KIND_LAYER = 0;
  LAYER_TREE_NODE_KIND_GROUP = 1;
}

message LayerTreeNode {
  string name = 1;
  LayerTreeNodeKind kind = 2;
  uint32 item_index = 3;
  // Uses 0xffffffff to mean "no parent", matching the current Zig sentinel.
  uint32 parent_index = 4;
  IndexRange child_range = 5;
  Vec3 color = 6;
  GroupColorTag color_tag = 7;
  LayerFlags flags = 8;
}

message LayerGroup {
  string name = 1;
  GroupColorTag color_tag = 2;
}

message MaterialSlot {
  uint64 stable_id = 1;
  string name = 2;
}

enum OnionSkinningMode {
  ONION_SKINNING_MODE_ABSOLUTE = 0;
  ONION_SKINNING_MODE_RELATIVE = 1;
  ONION_SKINNING_MODE_SELECTED = 2;
}

message OnionSkinningFlags {
  bool use_custom_colors = 1;
  bool use_fade = 2;
  bool show_loop = 3;
}

message OnionSkinningFilter {
  bool keyframe = 1;
  bool extreme = 2;
  bool breakdown = 3;
  bool jitter = 4;
  bool move_hold = 5;
}

message OnionSkinningSettings {
  float opacity = 1;
  OnionSkinningMode mode = 2;
  OnionSkinningFlags flags = 3;
  OnionSkinningFilter filter = 4;
  int32 frames_before = 5;
  int32 frames_after = 6;
  Color4 color_before = 7;
  Color4 color_after = 8;
}

message DocumentFlags {
  bool anim_channels_expanded = 1;
  bool autolock_layers = 2;
  bool stroke_order_3d = 3;
}

message Document {
  repeated DrawingSlot drawings = 1;
  repeated LayerTreeNode nodes = 2;
  repeated Layer layers = 3;
  repeated LayerGroup groups = 4;
  repeated MaterialSlot materials = 5;
  // Uses 0xffffffff to mean "no active node", matching the current Zig sentinel.
  uint32 active_node_index = 6;
  OnionSkinningSettings onion_skinning = 7;
  DocumentFlags flags = 8;
}
